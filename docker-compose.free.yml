version: "3.8"

services:
  # ============================================
  # IVS Backend API (FastAPI)
  # ============================================
  backend:
    build: ./backend
    container_name: ivs-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./deployed_apps:/app/deployed_apps
      - ./uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock
      - ./coredns:/etc/coredns
    environment:
      - DATABASE_URL=sqlite:///./data/ivs.db
      - SECRET_KEY=${SECRET_KEY:-change-me-generate-with-openssl-rand-hex-32}
      - VAULT_KEY=${VAULT_KEY:-change-me-generate-with-openssl-rand-hex-32}
      - DOMAIN_SUFFIX=${DOMAIN_SUFFIX:-vibe.local}
      - SERVER_IP=${SERVER_IP:-127.0.0.1}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - DOCKER_NETWORK=ivs-apps
    networks:
      - ivs-internal
      - ivs-apps
    depends_on:
      coredns:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ============================================
  # IVS Frontend Dashboard (Next.js)
  # ============================================
  frontend:
    build: ./frontend
    container_name: ivs-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - ivs-internal
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # Caddy Reverse Proxy
  # ============================================
  caddy:
    image: caddy:2-alpine
    container_name: ivs-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - ivs-internal
      - ivs-apps
    depends_on:
      - backend
      - frontend

  # ============================================
  # CoreDNS (Local DNS Server)
  # ============================================
  coredns:
    image: coredns/coredns:1.11.3
    container_name: ivs-coredns
    restart: unless-stopped
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    volumes:
      - ./coredns:/etc/coredns
    command: -conf /etc/coredns/Corefile
    networks:
      - ivs-internal

volumes:
  caddy_data:
  caddy_config:

networks:
  ivs-internal:
    driver: bridge
  ivs-apps:
    driver: bridge
    name: ivs-apps
